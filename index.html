<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMEN Casa</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, Arial;
    background: #ffffff;
    color: #0b0f14;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* LOGO */
.logo {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 40px;
}

.logo span {
    color: orange;
}

/* BUTTON */
.button {
    padding: 18px 30px;
    font-size: 18px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(45deg, #007aff, orange);
    color: white;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    transition: 0.2s;
}

.button:active {
    transform: scale(0.96);
}

/* FOOTER */
.footer {
    position: absolute;
    bottom: 30px;
    font-size: 14px;
    opacity: 0.7;
}

.footer a {
    color: #007aff;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="logo">
    LUMEN <span>Casa</span>
</div>

<button class="button" onclick="openSmartLife()">
    Acessar painel da casa
</button>

<div class="footer">
    Suporte técnico<br>
    Júlio César de Oliveira<br>
    <a href="https://wa.me/5564996039433" target="_blank">
        Falar no WhatsApp
    </a>
</div>

<script>
function openSmartLife(){
    window.location.href = "smartlife://";

    setTimeout(()=>{
        window.location.href = "https://play.google.com/store/apps/details?id=com.tuya.smartlife";
    },1500);
}
</script>

</body>
</html>
