<!doctype html>
<html lang="pt-BR">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>LUMEN Casa</title>
<style>
:root{--blue:#2f80ff;--orange:#ff8a00;--text:#1f2937;--muted:#6b7280;--line:rgba(47,128,255,.10);--shadow:0 24px 70px rgba(15, 23, 42, .10)}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(180deg,#fff,#f7f9ff);display:flex;justify-content:center;padding:18px;color:var(--text)}
.wrap{width:min(760px,100%)}
.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:18px;overflow:hidden}
.top{display:flex;justify-content:center;align-items:center;margin:4px 0 14px;min-height:150px;padding:8px 0 2px}
.logo{width:min(380px,92vw);max-height:130px;object-fit:contain;display:block;object-position:center center}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.grid img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:14px;display:block;box-shadow:0 10px 18px rgba(0,0,0,.08)}
.btn{display:flex;align-items:center;justify-content:center;width:100%;height:72px;border:none;border-radius:22px;color:#fff;font-weight:800;font-size:1.05rem;text-decoration:none;background:linear-gradient(135deg,var(--blue),var(--orange));box-shadow:0 18px 30px rgba(47,128,255,.2)}
.section{text-align:center;padding:18px 6px 0}
.title{font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#475467}
.name{margin-top:6px;color:var(--muted)}
.actions{display:grid;gap:10px;margin-top:16px}
.wa,.share,.install{height:56px;border-radius:16px;font-weight:800;border:none;display:flex;align-items:center;justify-content:center;text-decoration:none;gap:10px}
.wa{background:linear-gradient(135deg,#25d366,#1fb855);color:#fff}
.share{background:#f3f7ff;color:#2b4a7f;border:1px solid rgba(47,128,255,.12)}
.install{background:#edf3ff;color:#33558b;display:none}
.foot{margin-top:12px;text-align:center;color:#98a2b3;font-size:.9rem;line-height:1.35}
.icon{width:22px;height:22px;flex:0 0 22px}
@media (max-width:480px){
  .grid{gap:7px}
  .btn{height:68px;border-radius:18px;font-size:1rem}
  .wa,.share,.install{height:52px;border-radius:14px}
  .top{min-height:135px}
  .logo{width:min(330px,92vw);max-height:110px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
      <button id="installBtn" class="install">Adicionar à tela inicial</button>
    </div>

    <div class="top">
      <img class="logo" src="logo.png" alt="LUMEN Casa" />
    </div>

    <div class="grid">
      <img src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/97325497ac1697fdcda12384ba02b901caef1000.jpg" alt="Casa inteligente" />
      <img src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/6b817f6402f72f52791e419fe58c401f6b5b778a.jpg" alt="Interruptor inteligente" />
      <img src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/60e799b7c09715de6a20e9a03b9630fa3e042801.jpg" alt="Celular controlando automação" />
      <img src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/e1e2fe4c8ddc0d1ad05b95ceb9cf0204dbc45259.jpg" alt="Câmera Wi-Fi de segurança" />
    </div>

    <a class="btn" href="smartlife://">Acessar painel da casa</a>

    <div class="section">
      <div class="title">Suporte técnico</div>
      <div class="name">Júlio César de Oliveira</div>

        <a class="wa" href="https://wa.me/5564996039433" target="_blank" rel="noopener noreferrer">

          WhatsApp
        </a>
        <button class="share" id="shareBtn" type="button">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">ircle cx="18" cy="5" r="3"></circle>ircle cx="6" cy="12" r="3"></circle>ircle cx="18" cy="19" r="3"></circle>e x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>e x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
          Compartilhar cartão
        </button>
      </div>
    </div>

    <div class="foot">Comptilhe sua experiência. Indique Lumen Casa para amigos.</div>
  </div>
</div>

<script>
let deferredPrompt;
const installBtn = document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'flex';
});
installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.style.display = 'none';
});
document.getElementById('shareBtn').addEventListener('click', async () => {
  try {
    const shareData = {
      title: 'LUMEN Casa | Júlio César de Oliveira',
      text: 'Cartão de visitas digital de Júlio César de Oliveira - Técnico LUMEN Casa',
      url: 'https://wa.me/5564996039433'
    };
    if (navigator.share) await navigator.share(shareData);
    else {
      await navigator.clipboard.writeText(shareData.url);
      alert('Link copiado para compartilhar.');
    }
  } catch (e) {}
});
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
