<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>LUMEN Casa</title>
<style>
:root{--blue:#2f80ff;--orange:#ff8a00;--text:#1f2937;--muted:#6b7280;--line:rgba(47,128,255,.10);--shadow:0 24px 70px rgba(15, 23, 42, .10)}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(180deg,#fff,#f7f9ff);display:flex;justify-content:center;padding:18px;color:var(--text)}
.wrap{width:min(760px,100%)}
.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:18px;overflow:hidden}
.top{display:flex;justify-content:center;align-items:center;margin:4px 0 14px;min-height:170px;padding:8px 0 2px}
.logo{width:min(520px,96vw);max-height:160px;object-fit:contain;display:block;object-position:center center;transform:scale(1.15);transform-origin:center center}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.grid img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:14px;display:block;box-shadow:0 10px 18px rgba(0,0,0,.08)}
.btn{display:flex;align-items:center;justify-content:center;width:100%;height:72px;border:none;border-radius:22px;color:#fff;font-weight:800;font-size:1.05rem;text-decoration:none;background:linear-gradient(135deg,var(--blue),var(--orange));box-shadow:0 18px 30px rgba(47,128,255,.2)}
.section{text-align:center;padding:18px 6px 0}
.title{font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#475467}
.name{margin-top:6px;color:var(--muted)}
.actions{display:grid;gap:10px;margin-top:16px}
.wa,.share,.install{height:56px;border-radius:16px;font-weight:800;border:none;display:flex;align-items:center;justify-content:center;text-decoration:none;gap:10px;width:100%}
.wa{background:linear-gradient(135deg,#25d366,#1fb855);color:#fff}
.share{background:#f3f7ff;color:#2b4a7f;border:1px solid rgba(47,128,255,.12)}
.install{background:#edf3ff;color:#33558b;display:none}
.showcase{margin-top:18px;padding-top:14px;border-top:1px solid rgba(47,128,255,.08)}
.showcase-title{text-align:center;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#475467;font-size:.9rem;margin-bottom:10px}
.showcase-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.tile{display:flex;flex-direction:column;align-items:center;gap:6px}
.autoimg{width:100%;aspect-ratio:1/1;border-radius:14px;display:block;box-shadow:0 10px 18px rgba(0,0,0,.08);object-fit:cover;background:#fff}
.tile span{font-size:.75rem;line-height:1.15;text-align:center;color:#475467;font-weight:700}
.foot{margin-top:12px;text-align:center;color:#98a2b3;font-size:.9rem;line-height:1.35}
@media (max-width:480px){
  .grid{gap:7px}
  .btn{height:68px;border-radius:18px;font-size:1rem}
  .wa,.share,.install{height:52px;border-radius:14px}
  .top{min-height:150px}
  .logo{width:min(420px,96vw);max-height:135px;transform:scale(1.12)}
  .showcase-grid{gap:7px}
  .tile span{font-size:.7rem}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
      <button id="installBtn" class="install">Adicionar à tela inicial</button>
    </div>
    <div class="top"><img class="logo" src="./logo.png" alt="LUMEN Casa" /></div>
    <div class="grid">
      <img src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/5b438c6f79060d6d629efa651e3181f21477ab3e.jpg" alt="Controle de automação pelo celular" />
      <img src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/26029964810c4838e6a9f1102ab36f0c30e70c36.jpg" alt="Fechadura digital inteligente" />
      <img src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/96b8e88f02cb2155ca770eeee0cf8010d4cc9e72.jpg" alt="Sala com automação residencial" />
      <img src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/9c567e8932bc2ff2f2b45382f80487d069c98511.jpg" alt="Câmera de segurança" />
    </div>
    <a class="btn" href="smartlife://">Acessar painel da casa</a>
    <div class="section">
      <div class="title">Suporte técnico</div>
      <div class="name">Júlio César de Oliveira</div>
      <div class="actions">
        <a class="wa" href="https://wa.me/5564996039433" target="_blank" rel="noopener noreferrer">WhatsApp</a>
        <button class="share" id="shareBtn" type="button">Compartilhar cartão</button>
      </div>
    </div>
    <div class="showcase">
      <div class="showcase-title">Soluções em automação</div>
      <div class="showcase-grid">
        <div class="tile"><img class="autoimg" src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/79b9c92b8cf9ec8a3b3f15a220fc23283ef952ba.jpg" alt="Iluminação inteligente" /><span>Iluminação inteligente</span></div>
        <div class="tile"><img class="autoimg" src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/795d865afe813d502c61fb21c857b67410247c21.jpg" alt="Automação residencial" /><span>Automação residencial</span></div>
        <div class="tile"><img class="autoimg" src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/26029964810c4838e6a9f1102ab36f0c30e70c36.jpg" alt="Fechadura digital" /><span>Fechadura digital</span></div>
        <div class="tile"><img class="autoimg" src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/9c567e8932bc2ff2f2b45382f80487d069c98511.jpg" alt="Câmera de segurança" /><span>Câmera de segurança</span></div>
      </div>
    </div>
    <div class="foot">Compartilhe sua experiência. Indique Lumen Casa para amigos.</div>
  </div>
</div>
<script>
let deferredPrompt;
const installBtn = document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'flex'; });
installBtn.addEventListener('click', async () => { if (!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; installBtn.style.display = 'none'; });
document.getElementById('shareBtn').addEventListener('click', async () => {
  try {
    const url = 'https://wa.me/5564996039433?text=Ol%C3%A1%2C%20vim%20pelo%20cart%C3%A3o%20LUMEN%20Casa';
    const msg = 'Júlio César de Oliveira | LUMEN Casa
Técnico em automação residencial
WhatsApp direto: ' + url;
    if (navigator.share) await navigator.share({ title: 'Júlio César de Oliveira — LUMEN Casa', text: msg });
    else {
      await navigator.clipboard.writeText(msg);
      window.location.href = url;
    }
  } catch (e) {
    window.location.href = 'https://wa.me/5564996039433?text=Ol%C3%A1%2C%20vim%20pelo%20cart%C3%A3o%20LUMEN%20Casa';
  }
});
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
